<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Отправка данных</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            width: 90%;
            max-width: 500px;
        }
        h1 { text-align: center; color: #333; margin-bottom: 30px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 5px; color: #555; font-weight: bold; }
        input {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 5px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        input:focus { outline: none; border-color: #667eea; }
        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
        }
        button:hover { transform: translateY(-2px); }
        button:disabled { opacity: 0.6; cursor: not-allowed; }
        #result {
            margin-top: 20px;
            padding: 15px;
            border-radius: 5px;
            display: none;
        }
        #result.success {
            display: block;
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        #result.error {
            display: block;
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        .loading { text-align: center; margin-top: 20px; display: none; }
        .loading.show { display: block; }
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📊 Отправка данных</h1>
        <form id="dataForm">
            <div class="form-group">
                <label for="name">Имя:</label>
                <input type="text" id="name" placeholder="Введите имя" required>
            </div>
            <div class="form-group">
                <label for="O">O (экстраверсия):</label>
                <input type="number" id="O" placeholder="0-100" min="0" max="100" required>
            </div>
            <div class="form-group">
                <label for="P">P (интуиция):</label>
                <input type="number" id="P" placeholder="0-100" min="0" max="100" required>
            </div>
            <div class="form-group">
                <label for="R">R (рациональность):</label>
                <input type="number" id="R" placeholder="0-100" min="0" max="100" required>
            </div>
            <div class="form-group">
                <label for="E">E (эмоциональность):</label>
                <input type="number" id="E" placeholder="0-100" min="0" max="100" required>
            </div>
            <button type="submit" id="submitBtn">Отправить</button>
        </form>
        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p style="margin-top: 10px; color: #555;">Отправка данных...</p>
        </div>
        <div id="result"></div>
    </div>

    <script>
        // ⚠️ ЗАМЕНИТЕ НА ВАШ URL
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxWH8tnzrxmJXck6p2-RZuoRQd1YqiI7wQ9y-tiz_5bpgWVeno2nvmQ4tWhPJwAaBSw9A/exec';
        
        document.getElementById('dataForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            document.getElementById('loading').classList.add('show');
            document.getElementById('submitBtn').disabled = true;
            document.getElementById('result').style.display = 'none';
            
            const data = {
                name: document.getElementById('name').value,
                O: parseFloat(document.getElementById('O').value),
                P: parseFloat(document.getElementById('P').value),
                R: parseFloat(document.getElementById('R').value),
                E: parseFloat(document.getElementById('E').value),
                timestamp: new Date().toLocaleString()
            };
            
            try {
                const response = await fetch(SCRIPT_URL, {
                    method: 'POST',
                    mode: 'cors', // ← ИЗМЕНЕНО!
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(data)
                });
                
                const result = await response.json();
                console.log('Ответ:', result);
                
                if (result.error) {
                    showResult('❌ Ошибка: ' + result.error, 'error');
                } else {
                    showResult('✅ Ваш тип: ' + result.type, 'success');
                    document.getElementById('dataForm').reset();
                }
            } catch (error) {
                console.error('Ошибка:', error);
                showResult('❌ Ошибка при отправке: ' + error.message, 'error');
            } finally {
                document.getElementById('loading').classList.remove('show');
                document.getElementById('submitBtn').disabled = false;
            }
        });
        
        function showResult(message, type) {
            const resultDiv = document.getElementById('result');
            resultDiv.textContent = message;
            resultDiv.className = type;
            resultDiv.style.display = 'block';
        }
    </script>
</body>
</html>
